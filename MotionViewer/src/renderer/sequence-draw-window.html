<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>図形描写（連続写真）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* サイドバー */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
            z-index: 100;
        }

        .sidebar.collapsed {
            margin-left: -280px;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .sidebar-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* メインエリア */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ツールバー */
        .toolbar {
            height: 50px;
            background: #2c3e50;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }

        .toolbar-group {
            display: flex;
            gap: 4px;
            padding: 0 8px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .toolbar-group:last-child {
            border-right: none;
        }

        .toolbar-btn {
            background: transparent;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .toolbar-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .toolbar-btn:active {
            transform: scale(0.95);
        }

        .toolbar-btn.active {
            background: #3498db;
        }

        .toolbar-btn[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 1000;
        }

        .toolbar-spacer {
            flex: 1;
        }

        .frame-info {
            color: #ecf0f1;
            font-size: 13px;
            padding: 0 12px;
            white-space: nowrap;
        }

        .close-btn {
            background: #e74c3c !important;
        }

        .close-btn:hover {
            background: #c0392b !important;
        }

        /* キャンバス */
        #canvas-container {
            flex: 1;
            position: relative;
            background: #f0f0f0;
        }

        #sequence-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2c3e50;
            font-size: 18px;
            font-weight: 500;
        }

        /* サイドバー展開ボタン */
        .sidebar-expand-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 0 8px 8px 0;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
        }

        .sidebar-expand-btn:hover {
            width: 28px;
        }

        .sidebar.collapsed ~ .main-area .sidebar-expand-btn {
            display: flex;
        }

        /* 設定グループ */
        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group > label:first-child {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e2e8f0;
        }

        .setting-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-row label {
            font-size: 13px;
            color: #64748b;
            min-width: 80px;
        }

        .setting-row input[type="number"],
        .setting-row input[type="text"] {
            width: 80px;
            padding: 6px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            text-align: right;
        }

        .setting-row input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        /* スライダー */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-row input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            accent-color: #667eea;
        }

        .slider-value {
            min-width: 30px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
        }

        /* チェックボックスリスト */
        .checkbox-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fafbfc;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid #f1f5f9;
            gap: 8px;
        }

        .checkbox-item:last-child {
            border-bottom: none;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #667eea;
        }

        .checkbox-item .color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }

        .checkbox-item label {
            flex: 1;
            font-size: 12px;
            color: #475569;
            cursor: pointer;
        }

        .bulk-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .bulk-btn {
            flex: 1;
            padding: 6px 10px;
            font-size: 11px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bulk-btn:hover {
            background: #f1f5f9;
            border-color: #667eea;
        }

        /* 軌跡セクション */
        .trajectory-section {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid #7dd3fc;
        }

        .trajectory-section > label:first-child {
            color: #0369a1 !important;
            border-bottom-color: #38bdf8 !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- サイドバー -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>表示設定</h2>
                <button class="sidebar-toggle" id="sidebarToggle" title="サイドバーを閉じる">✕</button>
            </div>
            <div class="sidebar-content">
                <!-- フレーム設定 -->
                <div class="setting-group">
                    <label>フレーム範囲</label>
                    <div class="setting-row">
                        <label>開始:</label>
                        <input type="number" id="startFrameInput" min="1" value="1">
                    </div>
                    <div class="setting-row">
                        <label>終了:</label>
                        <input type="number" id="endFrameInput" min="1" value="100">
                    </div>
                    <div class="setting-row">
                        <label style="min-width: 40px;">間隔:</label>
                        <div class="slider-row">
                            <input type="range" id="intervalSlider" min="1" max="50" value="10" style="width: 100px;">
                            <span class="slider-value" id="intervalValue">10</span>
                        </div>
                    </div>
                </div>

                <!-- オフセット設定 -->
                <div class="setting-group">
                    <label>軸並行移動</label>
                    <div class="setting-row">
                        <label>X:</label>
                        <input type="number" id="offsetX" step="0.01" value="0">
                    </div>
                    <div class="setting-row">
                        <label>Y:</label>
                        <input type="number" id="offsetY" step="0.01" value="0">
                    </div>
                    <div class="setting-row">
                        <label>Z:</label>
                        <input type="number" id="offsetZ" step="0.01" value="0">
                    </div>
                </div>

                <!-- ライン設定 -->
                <div class="setting-group">
                    <label>表示するライン</label>
                    <div class="bulk-buttons">
                        <button class="bulk-btn" id="checkAllLines">全てON</button>
                        <button class="bulk-btn" id="uncheckAllLines">全てOFF</button>
                    </div>
                    <div class="checkbox-list" id="lineCheckboxes"></div>
                </div>

                <!-- ポイント設定 -->
                <div class="setting-group">
                    <label>表示するポイント</label>
                    <div class="bulk-buttons">
                        <button class="bulk-btn" id="checkAllPoints">全てON</button>
                        <button class="bulk-btn" id="uncheckAllPoints">全てOFF</button>
                    </div>
                    <div class="checkbox-list" id="pointCheckboxes"></div>
                </div>

                <!-- 軌跡設定 -->
                <div class="setting-group trajectory-section">
                    <label>軌跡表示</label>
                    <div class="bulk-buttons">
                        <button class="bulk-btn" id="checkAllTrajectories">全てON</button>
                        <button class="bulk-btn" id="uncheckAllTrajectories">全てOFF</button>
                    </div>
                    <div class="setting-row">
                        <label style="min-width: 40px;">太さ:</label>
                        <div class="slider-row">
                            <input type="range" id="trajectoryThickness" min="1" max="50" value="2" style="width: 100px;">
                            <span class="slider-value" id="trajectoryThicknessValue">2</span>
                        </div>
                    </div>
                    <div class="setting-row">
                        <label style="min-width: auto;">
                            <input type="checkbox" id="trajectoryGradient" style="margin-right: 6px;">
                            時間グラデーション
                        </label>
                    </div>
                    <div class="checkbox-list" id="trajectoryCheckboxes"></div>
                </div>
            </div>
        </div>

        <!-- メインエリア -->
        <div class="main-area">
            <div class="toolbar">
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="toggleSidebarBtn" data-tooltip="設定パネル">☰</button>
                </div>
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="saveImageBtn" data-tooltip="PNG保存">📷</button>
                    <button class="toolbar-btn" id="saveSVGBtn" data-tooltip="SVG保存">📐</button>
                    <button class="toolbar-btn" id="saveGLBBtn" data-tooltip="GLB保存">📦</button>
                </div>
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="resetViewBtn" data-tooltip="視点リセット">🔄</button>
                    <button class="toolbar-btn" id="viewXYBtn" data-tooltip="x-y平面">XY</button>
                    <button class="toolbar-btn" id="viewYZBtn" data-tooltip="y-z平面">YZ</button>
                    <button class="toolbar-btn" id="viewXZBtn" data-tooltip="x-z平面">XZ</button>
                </div>
                <div class="toolbar-spacer"></div>
                <div class="frame-info" id="frameInfo">フレーム: -</div>
                <div class="toolbar-group">
                    <button class="toolbar-btn close-btn" id="closeWindowBtn" data-tooltip="閉じる">✕</button>
                </div>
            </div>
            <div id="canvas-container">
                <canvas id="sequence-canvas"></canvas>
                <div class="loading" id="loading">描画中...</div>
                <button class="sidebar-expand-btn" id="sidebarExpandBtn">▶</button>
            </div>
        </div>
    </div>

    <script type="module" src="sequence-draw-window.js"></script>
</body>
</html>
