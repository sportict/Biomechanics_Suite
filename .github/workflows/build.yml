name: Build All Apps (Windows + macOS)

# トリガー: main/masterへのpush、バージョンタグ、PR、手動実行
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

# ==============================================================================
# HPE
# Python仮想環境(.venv)をelectron-builderに同梱するため、
# ビルド前にPython依存パッケージのインストールが必要
# ==============================================================================
jobs:
  build-hpe:
    name: HPE / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build
          - os: macos-14          # Apple Silicon (arm64)
            build_cmd: npm run build:mac
    defaults:
      run:
        working-directory: HPE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: HPE/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Python依存パッケージのキャッシュ (Windows)
      - name: Cache Python venv (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: HPE/.venv
          key: hpe-venv-win-${{ hashFiles('HPE/build.bat') }}

      # Python依存パッケージのキャッシュ (macOS)
      - name: Cache Python venv (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: HPE/.venv
          key: hpe-venv-mac-${{ hashFiles('HPE/build.sh') }}

      # Python仮想環境とパッケージのインストール (Windows)
      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path ".venv\Scripts\python.exe")) {
            python -m venv .venv
          }
          .venv\Scripts\pip install --upgrade pip --quiet
          if (Test-Path "rtmlib") {
            .venv\Scripts\pip install ./rtmlib --no-deps --quiet
          }
          .venv\Scripts\pip install `
            fastapi uvicorn python-multipart `
            "numpy>=1.24.0,<2.0.0" `
            "opencv-python>=4.8.0" `
            "Pillow>=10.0.0" `
            "tqdm>=4.66.0" `
            "scipy>=1.11.0" `
            "filterpy>=1.4.0" `
            "ffmpeg-python>=0.2.0" `
            "norfair>=2.2.0" `
            --quiet
          # onnxruntime-gpu (CUDA不要でもインストール可能)
          .venv\Scripts\pip install "onnxruntime-gpu>=1.18.0" --quiet 2>$null
          if ($LASTEXITCODE -ne 0) {
            .venv\Scripts\pip install onnxruntime --quiet
          }

      # Python仮想環境とパッケージのインストール (macOS)
      - name: Install Python deps (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ ! -f ".venv/bin/python" ]; then
            python3 -m venv .venv
          fi
          .venv/bin/pip install --upgrade pip --quiet
          # Apple Silicon: onnxruntime-silicon を優先、なければ標準版
          .venv/bin/pip install onnxruntime-silicon --quiet 2>/dev/null || \
            .venv/bin/pip install onnxruntime --quiet
          if [ -d "rtmlib" ]; then
            .venv/bin/pip install ./rtmlib --no-deps --quiet
          fi
          .venv/bin/pip install \
            fastapi uvicorn python-multipart \
            "numpy>=1.24.0,<2.0.0" \
            "opencv-python>=4.8.0" \
            "Pillow>=10.0.0" \
            "tqdm>=4.66.0" \
            "scipy>=1.11.0" \
            "filterpy>=1.4.0" \
            "ffmpeg-python>=0.2.0" \
            "norfair>=2.2.0" \
            --quiet

      - name: Install Node deps
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # macOSコード署名をスキップ
          WIN_CSC_LINK: ''                        # Windows証明書なし

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HPE-${{ runner.os }}
          path: |
            HPE/dist/*.exe
            HPE/dist/*.dmg
            HPE/dist/*.zip
          if-no-files-found: error

# ==============================================================================
# MotionDigitizer
# OpenCV C++ネイティブアドオンのビルドが必要
# Windows: vcpkg, macOS: Homebrew
# ==============================================================================
  build-motion-digitizer:
    name: MotionDigitizer / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build
          - os: macos-14
            build_cmd: npm run build:mac
    defaults:
      run:
        working-directory: MotionDigitizer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: MotionDigitizer/package-lock.json

      # vcpkgバイナリキャッシュを有効化 (Windowsのみ)
      # 初回ビルドは30-60分かかるが、2回目以降はキャッシュで数分に短縮
      - name: Export GitHub Actions cache env for vcpkg
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # vcpkgのOpenCVインストール (Windows)
      # binding.gypのパス C:/vcpkg/installed/x64-windows/ に合わせる
      - name: Cache vcpkg installed (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-opencv4-contrib-x64-windows-${{ hashFiles('MotionDigitizer/native/binding.gyp') }}
          restore-keys: |
            vcpkg-opencv4-contrib-x64-windows-

      - name: Install OpenCV via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          # opencv4[contrib] にはaruco等の追加モジュールが含まれる
          & C:\vcpkg\vcpkg.exe install `
            "opencv4[core,highgui,imgproc,imgcodecs,videoio,calib3d,objdetect,features2d,contrib]:x64-windows" `
            --disable-metrics

      # OpenCVのHomebrewインストール (macOS)
      - name: Install OpenCV via Homebrew (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install opencv
          # pkg-configパスを設定 (node-gypがOpenCVを見つけられるようにする)
          echo "PKG_CONFIG_PATH=$(brew --prefix opencv)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install Node deps
        run: npm ci

      # npm run build:mac = npm run build:native && electron-builder --mac --arm64
      # npm run build    = npm run build:native && electron-builder --win --x64
      - name: Build native addon + Electron app
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MotionDigitizer-${{ runner.os }}
          path: |
            MotionDigitizer/dist/*.exe
            MotionDigitizer/dist/*.dmg
          if-no-files-found: error

# ==============================================================================
# MotionViewer
# 純粋なElectronアプリ (ffmpeg-static, three.js)
# ==============================================================================
  build-motion-viewer:
    name: MotionViewer / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build
          - os: macos-14
            build_cmd: npm run build:mac
    defaults:
      run:
        working-directory: MotionViewer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: MotionViewer/package-lock.json

      - name: Install Node deps
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MotionViewer-${{ runner.os }}
          path: |
            MotionViewer/dist/*.exe
            MotionViewer/dist/*.dmg
          if-no-files-found: error

# ==============================================================================
# VideoSyncLab
# ネイティブモジュール: canvas, sharp, onnxruntime-node
# postinstallでelectron-builder install-app-depsが自動実行される
# ==============================================================================
  build-video-sync-lab:
    name: VideoSyncLab / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build
          - os: macos-14
            build_cmd: npm run build:mac
    defaults:
      run:
        working-directory: VideoSyncLab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: VideoSyncLab/package-lock.json

      # canvasのビルドに必要なシステムライブラリ (macOS)
      # sharp, onnxruntime-nodeは事前ビルドバイナリを使用するため不要
      - name: Install canvas system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo pango pkg-config libpng

      # node-canvas (Windows) はMSVCビルドツールが必要
      # windows-latestランナーにはVisual Studio Build Toolsが含まれるため自動解決
      - name: Install Node deps
        run: npm ci
        # postinstallで `electron-builder install-app-deps` が実行される

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideoSyncLab-${{ runner.os }}
          path: |
            VideoSyncLab/dist/*.exe
            VideoSyncLab/dist/*.dmg
          if-no-files-found: error

# ==============================================================================
# Release
# バージョンタグ(v*)のpush時のみ実行
# 全アプリのビルド成功後にGitHub Releaseを作成し、成果物をアップロード
# ==============================================================================
  release:
    name: Create GitHub Release
    needs:
      - build-hpe
      - build-motion-digitizer
      - build-motion-viewer
      - build-video-sync-lab
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: List downloaded files
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
